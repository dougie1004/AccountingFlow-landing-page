<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리스크 진단 | AccountingFlow - 스타트업 재무 생존 확률 체크</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <style>
        :root {
            --primary-bg: #02040a;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        header {
            padding: 2rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 3rem;
        }

        .logo img {
            width: 200px;
            height: auto;
            display: block;
        }

        .diagnosis-content {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding-bottom: 5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent);
            border-radius: 100px;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.2;
            word-break: keep-all;
            background: linear-gradient(180deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intro-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            word-break: keep-all;
        }

        .form-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Custom Scrollbar for iframe area */
        .form-container::-webkit-scrollbar {
            width: 6px;
        }

        .form-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 800px;
            /* 고정 높이 또는 동적 조절 필요 */
            border: none;
        }

        footer {
            padding: 3rem 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem 0;
            }

            .diagnosis-content {
                padding-bottom: 3rem;
            }

            iframe {
                height: 1000px;
                /* 모바일에서는 길어질 수 있음 */
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: center;">
            <a href="index.html" class="logo">
                <img src="accountingflow_logo_youtube2.png" alt="AccountingFlow Logo">
            </a>
        </div>
    </header>

    <main class="diagnosis-content container">
        <div class="badge">VC Standard Diagnosis</div>
        <h1>스타트업 재무 리스크<br>자가 진단 서비스</h1>
        <p class="intro-text">
            본 진단은 VC들이 선호하는 재무 건전성 지표를 기반으로 설계되었습니다.<br>
            약 3분 만에 우리 회사의 생존 확률과 개선 포인트를 확인하세요.
        </p>

        <div class="form-container">
            <!-- Tally Embed -->
            <iframe src="https://tally.so/embed/81d5A5?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
                loading="lazy" title="AccountingFlow 참여 신청 및 자가 진단">
            </iframe>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 AccountingFlow. All rights reserved.</p>
        </div>
    </footer>

    <!-- Tally Embed Script for dynamic height -->
    <script>
        var d = document, w = "https://tally.so/widgets/embed.js", v = function () { "undefined" != typeof Tally ? Tally.loadEmbeds() : d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function (e) { e.src = e.dataset.tallySrc })) }; if ("undefined" != typeof Tally) v(); else if (d.querySelector('script[src="' + w + '"]')) v(); else { var s = d.createElement("script"); s.src = w, s.onload = v, s.onerror = v, d.body.appendChild(s); }
    </script>
</body>

</html>
